type: custom:auto-entities
card:
  type: entities
  title: "Zigbee Signal Strength (LQI)"
  card_mod:
    style:
      template-entity-row $: |
        state-badge { background-color: transparent !important; }
        .flex { margin-left: 0px !important; }
      .: |
        template-entity-row { font-family: monospace; font-size: 90%; }
filter:
  include:
    - entity_id: sensor.*_linkquality
      options:
        type: custom:template-entity-row
        active: true
        name: |
          {# ======= CONFIGURATION ======= #}
          {% set suffix = 'Linkquality' %}
          {# ============================= #}
          {% set fname = state_attr(config.entity, 'friendly_name') | default(config.entity) | string %}
          {{ fname | replace(' ' ~ suffix, '') | replace(suffix, '') | replace(' ' ~ suffix | lower, '') | replace(suffix | lower, '') }}
        state: >
          {# ======= CONFIGURATION ======= #}
          {% set networkmap = 'sensor.zigbee2mqtt_networkmap' %}
          {% set suffix = 'Linkquality' %}
          {# ============================= #}
          {% set nodes = state_attr(networkmap, 'nodes') or [] %} 
          {% set links = state_attr(networkmap, 'links') or [] %} 
          {% set fname = state_attr(config.entity, 'friendly_name') | default(config.entity) | string %}
          {% set my_name = fname | replace(' ' ~ suffix, '') | replace(suffix, '') | replace(' ' ~ suffix | lower, '') | replace(suffix | lower, '') | trim %} 
          {% set ns = namespace(my_ieee=none, down='--', up='--', has_connection=false) %} 
          {% if nodes and links %}
            {% for node in nodes %}{% if node.friendlyName == my_name %}{% set ns.my_ieee = node.ieeeAddr %}{% endif %}{% endfor %}
            {% if ns.my_ieee %}
              {% set p_link = links | selectattr('targetIeeeAddr', 'eq', ns.my_ieee) | selectattr('relationship', 'eq', 0) | first | default(none) %}
              {% if p_link %}
                {% set ns.down = p_link.lqi %}
                {% set up_link = links | selectattr('sourceIeeeAddr', 'eq', ns.my_ieee) | selectattr('targetIeeeAddr', 'eq', p_link.sourceIeeeAddr) | first | default(none) %}
                {% if up_link %}
                  {% set ns.up = up_link.lqi %}
                  {% set ns.has_connection = true %}
                {% endif %}
              {% endif %}
            {% endif %}
          {% endif %} {{ ns.down }} / {{ ns.up }}
        secondary: >
          {# ======= CONFIGURATION ======= #}
          {% set networkmap = 'sensor.zigbee2mqtt_networkmap' %}
          {% set suffix = 'Linkquality' %}
          {% set text_not_found = 'Not Found' %}
          {% set text_coordinator = 'Coordinator' %}
          {# ============================= #}
          {% set nodes = state_attr(networkmap, 'nodes') or [] %} 
          {% set links = state_attr(networkmap, 'links') or [] %} 
          {% set fname = state_attr(config.entity, 'friendly_name') | default(config.entity) | string %}
          {% set my_name = fname | replace(' ' ~ suffix, '') | replace(suffix, '') | replace(' ' ~ suffix | lower, '') | replace(suffix | lower, '') | trim %} 
          {% set coord_lqi = states(config.entity) %} 
          {% set ns = namespace(my_ieee=none, p_name=text_not_found) %} 
          {% if nodes and links %}
            {% for node in nodes %}{% if node.friendlyName == my_name %}{% set ns.my_ieee = node.ieeeAddr %}{% endif %}{% endfor %}
            {% if ns.my_ieee %}
              {% set p_link = links | selectattr('targetIeeeAddr', 'eq', ns.my_ieee) | selectattr('relationship', 'eq', 0) | first | default(none) %}
              {% if p_link %}
                {% for node in nodes %}{% if node.ieeeAddr == p_link.sourceIeeeAddr %}
                  {% set ns.p_name = text_coordinator if node.type == 'Coordinator' else node.friendlyName %}
                {% endif %}{% endfor %}
              {% endif %}
            {% endif %}
          {% endif %} 📡 {{ coord_lqi }} ⬆️ {{ ns.p_name }}
        icon: >
          {# ======= CONFIGURATION ======= #}
          {% set networkmap = 'sensor.zigbee2mqtt_networkmap' %}
          {% set suffix = 'Linkquality' %}
          {# ============================= #}
          {% set nodes = state_attr(networkmap, 'nodes') or [] %} 
          {% set links = state_attr(networkmap, 'links') or [] %} 
          {% set fname = state_attr(config.entity, 'friendly_name') | default(config.entity) | string %}
          {% set my_name = fname | replace(' ' ~ suffix, '') | replace(suffix, '') | replace(' ' ~ suffix | lower, '') | replace(suffix | lower, '') | trim %} 
          {% set ns = namespace(my_ieee=none, avg=-1) %} 
          {% if nodes and links %}
            {% for node in nodes %}{% if node.friendlyName == my_name %}{% set ns.my_ieee = node.ieeeAddr %}{% endif %}{% endfor %}
            {% if ns.my_ieee %}
              {% set p_link = links | selectattr('targetIeeeAddr', 'eq', ns.my_ieee) | selectattr('relationship', 'eq', 0) | first | default(none) %}
              {% if p_link %}
                {% set up_link = links | selectattr('sourceIeeeAddr', 'eq', ns.my_ieee) | selectattr('targetIeeeAddr', 'eq', p_link.sourceIeeeAddr) | first | default(none) %}
                {% if up_link %}
                  {% set ns.avg = (p_link.lqi + up_link.lqi) / 2 %}
                {% endif %}
              {% endif %}
            {% endif %}
          {% endif %} 
          {% if ns.avg >= 200 %} mdi:signal-cellular-3 
          {% elif ns.avg >= 150 %} mdi:signal-cellular-2 
          {% elif ns.avg >= 100 %} mdi:signal-cellular-1 
          {% elif ns.avg >= 50 %} mdi:signal-cellular-outline 
          {% else %} mdi:signal-off {% endif %}
        card_mod:
          style: |
            :host {
              {# ======= CONFIGURATION ======= #}
              {% set networkmap = 'sensor.zigbee2mqtt_networkmap' %}
              {% set suffix = 'Linkquality' %}
              {# ============================= #}
              {% set nodes = state_attr(networkmap, 'nodes') or [] %}
              {% set links = state_attr(networkmap, 'links') or [] %}
              {% set fname = state_attr(config.entity, 'friendly_name') | default(config.entity) | string %}
              {% set my_name = fname | replace(' ' ~ suffix, '') | replace(suffix, '') | trim %}
              {% set ns = namespace(my_ieee=none, avg=-1) %}
              {% if nodes and links %}
                {% for node in nodes %}{% if node.friendlyName == my_name %}{% set ns.my_ieee = node.ieeeAddr %}{% endif %}{% endfor %}
                {% if ns.my_ieee %}
                  {% set p_link = links | selectattr('targetIeeeAddr', 'eq', ns.my_ieee) | selectattr('relationship', 'eq', 0) | first | default(none) %}
                  {% if p_link %}
                    {% set up_link = links | selectattr('sourceIeeeAddr', 'eq', ns.my_ieee) | selectattr('targetIeeeAddr', 'eq', p_link.sourceIeeeAddr) | first | default(none) %}
                    {% if up_link %}
                      {% set ns.avg = (p_link.lqi + up_link.lqi) / 2 %}
                    {% endif %}
                  {% endif %}
                {% endif %}
              {% endif %}
              {% if ns.avg >= 200 %} --paper-item-icon-color: #4CAF50;
              {% elif ns.avg >= 150 %} --paper-item-icon-color: #FDD835;
              {% elif ns.avg >= 100 %} --paper-item-icon-color: #FB8C00;
              {% elif ns.avg >= 50 %} --paper-item-icon-color: #F44336;
              {% else %} --paper-item-icon-color: #5F5F5F;
              {% endif %}
            }
            state-badge { color: var(--paper-item-icon-color); }
sort:
  method: friendly_name
  ignore_case: true